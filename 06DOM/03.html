<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>DOM | Sumit Kumar </title>
</head>
<body style="background-color: black; color :white;">
    

    <div class="parent">
        <div class="day"> monday </div>
        <div class="day"> tuesday </div>
        <div class="day"> wednesday </div>
        <div class="day"> thursday </div>
    </div>
    
</body>
<script>
    const parent = document.querySelector('.parent');
    console.log(parent);// <div class="parent">...</div>

console.log(parent.children);// HTMLCollection(4) [div.day, div.day, div.day, div.day]
console.log(parent.children[0]);// <div class="day"> monday </div>
for(let i = 0; i < parent.children.length; i++){
    console.log(parent.children[i]);
    // <div class="day"> monday </div>
    // <div class="day"> tuesday </div>
    // <div class="day"> wednesday </div>
    // <div class="day"> thursday </div>
};

parent.children[0].style.color = 'red';

console.log(parent.firstElementChild);// <div class="day"> monday </div>
console.log(parent.lastElementChild);// <div class="day"> thursday </div>

const day1 = document.querySelector('.day');
day1.style.color = 'blue';

console.log(day1.parentElement);// <div class="parent">...</div>
console.log(day1.nextElementSibling);// <div class="day"> tuesday </div>
console.log(day1.previousElementSibling);// null

console.log(parent.childNodes);// NodeList(7) [text, div.day, text, div.day, text, div.day, text, div.day, text]

</script>

</html>
